name: Extension Release

on:
  push:
    tags:
      - 'ext/v*'

jobs:
  build-and-test:
    name: Build + Test (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest
            target: darwin-arm64
          - os: macos-15-large
            target: darwin-x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: TypeScript typecheck
        working-directory: extension
        run: npx tsc --noEmit

      - name: Build extension bundle
        working-directory: extension
        run: npm run build:prod

      - name: Run integration tests (Linux)
        if: runner.os == 'Linux'
        working-directory: extension
        run: xvfb-run -a npm test

      - name: Run integration tests (macOS)
        if: runner.os != 'Linux'
        working-directory: extension
        run: npm test

      - name: Package VSIX
        working-directory: extension
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#ext/v}"
          npx @vscode/vsce package --target ${{ matrix.target }} \
            -o this-code-${VERSION}-${{ matrix.target }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: extension/this-code-*.vsix

  release:
    name: Create GitHub Release
    needs: [build-and-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.vsix
          name: Extension ${{ github.ref_name }}
