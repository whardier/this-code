name: Extension Release

on:
  push:
    tags:
      - 'ext/v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.1.0) — GitHub Release is skipped on manual dispatch'
        required: true
        type: string

jobs:
  build-and-test:
    name: Build + Test (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest
            target: darwin-arm64
          - os: macos-latest
            target: darwin-x64
            npm_arch: x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            V="${{ github.ref_name }}"
            V="${V#ext/v}"
          else
            V="${{ inputs.version }}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json

      - name: Install Xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      - name: Configure npm architecture (cross-compile)
        if: matrix.npm_arch != ''
        run: echo "npm_config_arch=${{ matrix.npm_arch }}" >> "$GITHUB_ENV"

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: TypeScript typecheck
        working-directory: extension
        run: npx tsc --noEmit

      - name: Build extension bundle
        working-directory: extension
        run: npm run build:prod

      - name: Run integration tests (Linux)
        if: runner.os == 'Linux'
        working-directory: extension
        run: xvfb-run -a npm test

      - name: Run integration tests (macOS)
        if: runner.os != 'Linux' && !matrix.npm_arch
        working-directory: extension
        run: npm test

      - name: Verify manifest
        working-directory: extension
        run: |
          node -e "
            const p = require('./package.json');
            const id = p.publisher + '.' + p.name;
            if (id !== 'whardier.this-code') throw new Error('Wrong ID: ' + id);
            if (JSON.stringify(p.extensionKind) !== '[\"workspace\"]') throw new Error('extensionKind wrong');
            if (!p.activationEvents.includes('onStartupFinished')) throw new Error('activationEvents wrong');
            if (p.contributes.commands) throw new Error('commands must not exist');
            const keys = Object.keys(p.contributes.configuration.properties).sort().join(',');
            if (keys !== 'thisCode.enable,thisCode.logLevel') throw new Error('settings wrong: ' + keys);
            console.log('Manifest OK:', id);
          "

      - name: Verify dist output
        working-directory: extension
        run: test -f dist/extension.js && echo "dist/extension.js exists"

      - name: Check no save trigger
        working-directory: extension
        run: |
          if grep -r "onDidSaveTextDocument" src/ --exclude-dir=test; then
            echo "ERROR: onDidSaveTextDocument found in source — TRACK-05 violation"
            exit 1
          fi
          echo "TRACK-05 OK: no onDidSaveTextDocument"

      - name: Package VSIX
        working-directory: extension
        run: |
          npx @vscode/vsce package --target ${{ matrix.target }} \
            -o this-code-${{ steps.version.outputs.version }}-${{ matrix.target }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: vsix-${{ matrix.target }}
          path: extension/this-code-*.vsix

  release:
    name: Create GitHub Release
    needs: [build-and-test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: vsix-*
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.vsix
          name: Extension ${{ github.ref_name }}
