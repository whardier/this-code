name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'LICENSE'
      - 'prek.toml'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'README.md'
      - 'LICENSE'
      - 'prek.toml'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  root:
    name: Root checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify required files
        run: |
          test -s LICENSE && echo "LICENSE OK"
          test -s README.md && echo "README.md OK"

      - name: Validate prek.toml (TOML syntax)
        run: python3 -c "import tomllib, sys; tomllib.load(open(sys.argv[1], 'rb')); print('prek.toml OK')" prek.toml

      - name: Validate workflow YAML syntax
        run: |
          python3 -c "
          import yaml, glob, sys
          errors = []
          for f in sorted(glob.glob('.github/workflows/*.yml')):
              try:
                  yaml.safe_load(open(f))
                  print(f'OK: {f}')
              except yaml.YAMLError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors), file=sys.stderr)
              sys.exit(1)
          "
